name: Release (Tag-Based)
on:
  push:
    tags:
      - "v*"
jobs:
  build-javapackager:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Get JavaPackager devel HEAD SHA
        id: get-sha
        run: |
          SHA=$(git ls-remote https://github.com/fvarrui/JavaPackager.git refs/heads/devel | cut -c1-7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=1.7.7-${SHA}" >> $GITHUB_OUTPUT

      - name: Check if version exists in GitHub Packages
        id: check
        run: |
          VERSION="${{ steps.get-sha.outputs.version }}"
          PACKAGE_NAME="io.github.fvarrui.javapackager"
          # Use org endpoint (Merkel-Games is an organization)
          API_URL="https://api.github.com/orgs/Merkel-Games/packages/maven/${PACKAGE_NAME}/versions"
          HTTP_CODE=$(curl -s -o /tmp/versions.json -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")
          if [ "$HTTP_CODE" = "200" ]; then
            # Check if any version in the list matches our VERSION
            if grep -q "\"name\": \"${VERSION}\"" /tmp/versions.json; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Version ${VERSION} already exists in GitHub Packages"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Version ${VERSION} not found, will build and deploy"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "API returned HTTP ${HTTP_CODE}, assuming package does not exist or cannot be read, will build and deploy"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone JavaPackager (devel)
        if: steps.check.outputs.exists != 'true'
        run: |
          git clone https://github.com/fvarrui/JavaPackager.git
          cd JavaPackager
          git checkout devel

      - name: Build and install to local Maven repo
        if: steps.check.outputs.exists != 'true'
        run: cd JavaPackager && ./gradlew -Pversion=${{ steps.get-sha.outputs.version }} publishToMavenLocal

      - name: Configure Maven for GitHub Packages deploy
        if: steps.check.outputs.exists != 'true'
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Packages
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.get-sha.outputs.version }}"
          BASE=~/.m2/repository/io/github/fvarrui/javapackager/1.7.7-SNAPSHOT
          mkdir -p /tmp/deploy

          # Copy and patch POM
          cp "$BASE/javapackager-1.7.7-SNAPSHOT.pom" "/tmp/deploy/javapackager-${VERSION}.pom"
          sed -i "s|<version>1.7.7-SNAPSHOT</version>|<version>${VERSION}</version>|" "/tmp/deploy/javapackager-${VERSION}.pom"

          # Extract JAR, patch internal metadata to match new version, and re-package
          mkdir -p /tmp/jar-work
          cd /tmp/jar-work
          cp "$BASE/javapackager-1.7.7-SNAPSHOT.jar" .
          unzip -q javapackager-1.7.7-SNAPSHOT.jar -d extracted
          cd extracted
          find . -type f \( -name "pom.properties" -o -name "plugin.xml" \) \
            -exec sed -i "s/1.7.7-SNAPSHOT/${VERSION}/g" {} +
          jar cf "/tmp/deploy/javapackager-${VERSION}.jar" *
          rm -rf /tmp/jar-work

          # Deploy the patched jar and pom
          mvn deploy:deploy-file \
            -DgroupId=io.github.fvarrui \
            -DartifactId=javapackager \
            -Dversion="${VERSION}" \
            -Dpackaging=jar \
            -Dfile="/tmp/deploy/javapackager-${VERSION}.jar" \
            -DpomFile="/tmp/deploy/javapackager-${VERSION}.pom" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/Merkel-Games/AmerecoLauncher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version output
        id: set-version
        run: echo "version=${{ steps.get-sha.outputs.version }}" >> $GITHUB_OUTPUT

  build-packages:
    needs: build-javapackager
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: |
              target/AmerecoLauncher*.deb
              target/AmerecoLauncher*.rpm
              target/AmerecoLauncher*.AppImage
          - os: windows-latest
            ext: |
              target/AmerecoLauncher*.exe
              target/AmerecoLauncher*.msi
              target/AmerecoLauncher*.msm
          - os: macos-latest
            ext: |
              target/AmerecoLauncher*.pkg
              target/AmerecoLauncher*.dmg
    steps:
      - name: Configure Maven settings for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get OS info
        run: mvn enforcer:display-info
        
      - name: List active profiles
        run: mvn help:active-profiles "-Dpackager.javapackager" "-Ddownload-jdk" "-Djavapackager.version=${{ needs.build-javapackager.outputs.version }}"

      - name: Build
        run: mvn clean package "-Dpackager.javapackager" "-Ddownload-jdk" "-Djavapackager.version=${{ needs.build-javapackager.outputs.version }}"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: AmerecoLauncher_${{ runner.os }}-${{ runner.arch }}
          path: ${{ matrix.ext }}
          
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get OS info
        run: mvn enforcer:display-info
        
      - name: List active profiles
        run: mvn help:active-profiles "-Dpackager.jar"

      - name: Build
        run: mvn clean package "-Dpackager.jar"
       
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: AmerecoLauncher.jar
          path: target/AmerecoLauncher*.jar
          
  release:
    needs: [build-javapackager, build-jar, build-packages]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Strip version from filenames
        run: |
          find . -name "AmerecoLauncher*" -type f | while read f; do
            newname=$(echo "$f" | sed -E 's/AmerecoLauncher-[0-9]+\.[0-9]+\.[0-9]+/AmerecoLauncher/')
            mv "$f" "$newname"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AmerecoLauncher*/AmerecoLauncher-*.deb
            AmerecoLauncher*/AmerecoLauncher-*.rpm
            AmerecoLauncher*/AmerecoLauncher-*.AppImage
            AmerecoLauncher*/AmerecoLauncher-*.exe
            AmerecoLauncher*/AmerecoLauncher-*.msi
            AmerecoLauncher*/AmerecoLauncher-*.pkg
            AmerecoLauncher*/AmerecoLauncher-*.dmg
            AmerecoLauncher*/AmerecoLauncher*.jar
          tag_name: ${{ github.ref_name }}
#          body: "Automated release of ${{ github.ref_name }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}