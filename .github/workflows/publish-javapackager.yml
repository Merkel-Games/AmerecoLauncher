name: Publish JavaPackager Plugin
on:
  workflow_dispatch:
    inputs:
      javapackager_commit:
        description: 'JavaPackager devel commit ID to build (full or short SHA)'
        required: true

jobs:
  build-javapackager:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pin-version.outputs.version }}
    steps:
      - name: Resolve pinned commit and compute version
        id: pin-version
        run: |
          COMMIT="${{ inputs.javapackager_commit }}"
          SHA="${COMMIT:0:7}"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=1.7.7-${SHA}" >> $GITHUB_OUTPUT

      - name: Check if version exists in GitHub Packages
        id: check
        run: |
          VERSION="${{ steps.pin-version.outputs.version }}"
          PACKAGE_NAME="io.github.fvarrui.javapackager"
          API_URL="https://api.github.com/orgs/Merkel-Games/packages/maven/${PACKAGE_NAME}/versions"
          HTTP_CODE=$(curl -s -o /tmp/versions.json -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")
          if [ "$HTTP_CODE" = "200" ]; then
            if grep -q "\"name\": \"${VERSION}\"" /tmp/versions.json; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Version ${VERSION} already exists in GitHub Packages, skipping build"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Version ${VERSION} not found, will build and deploy"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "API returned HTTP ${HTTP_CODE}, assuming package does not exist, will build and deploy"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone JavaPackager and checkout pinned commit
        if: steps.check.outputs.exists != 'true'
        run: |
          git clone https://github.com/fvarrui/JavaPackager.git
          cd JavaPackager
          git fetch origin devel
          git checkout ${{ inputs.javapackager_commit }}

      # Applies three patches to the cloned JavaPackager source before building:
      #
      # Fix 1 - project version: patch build.gradle so Gradle, the embedded Maven
      #   subprocess (generatePluginDescriptor), and all generated POMs all see the
      #   same version. Using -Pversion alone does NOT propagate into the Maven call.
      #
      # Fix 2 - commons-lang3 3.9 to 3.12.0: devel calls ObjectUtils.getIfNull()
      #   which was added in 3.12.0, but build.gradle declares 3.9, causing:
      #   NoSuchMethodError: ObjectUtils.getIfNull(Object, Supplier)
      #
      # Fix 3 - Velocity template parse error in linux/startup.sh.vtl line 70:
      #   Velocity 2.3 treats '@' as a directive sigil, so ${option[@]} causes:
      #   Lexical error, Encountered "@" at line 70 column 89
      #   The fix wraps that line in #[[...]]# (Velocity unparsed content block)
      #   so it is emitted literally with no token substitution at all.
      - name: Patch JavaPackager source
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.pin-version.outputs.version }}"
 
          # Fix 1: override the project version in build.gradle
          sed -i "s/^version = '.*'/version = '${VERSION}'/" JavaPackager/build.gradle
 
          # Fix 2: upgrade commons-lang3 from 3.9 to 3.12.0
          sed -i "s/commons-lang3:[0-9.]*/commons-lang3:3.12.0/" JavaPackager/build.gradle
 
          echo "=== build.gradle patches ==="
          grep "^version = \|commons-lang3" JavaPackager/build.gradle
 
          # Fix 3: wrap the ${option[@]} line in a Velocity unparsed block.
          # sed cannot handle the mix of quotes reliably, so use Python inline.
          python3 - << 'PYEOF'
          import re
          path = "JavaPackager/src/main/resources/linux/startup.sh.vtl"
          with open(path, "r") as f:
              src = f.read()
          # Match the exact line that triggers the Velocity lexer error
          pattern = r'(\[ -f "\$\{JVMOptionsFile\}".*JVMOptionsFile\}\}")'
          replacement = r'#[[ \1 ]]#'
          patched, n = re.subn(pattern, replacement, src)
          if n == 0:
              print("WARNING: startup.sh.vtl pattern not matched - already patched or changed upstream")
          else:
              with open(path, "w") as f:
                  f.write(patched)
              print(f"Patched {n} occurrence(s) in {path}")
          PYEOF
 
          echo "=== startup.sh.vtl line 70 ==="
          sed -n '70p' JavaPackager/src/main/resources/linux/startup.sh.vtl

      - name: Build and publish to Maven Local
        if: steps.check.outputs.exists != 'true'
        run: cd JavaPackager && ./gradlew publishToMavenLocal

      - name: Verify built artifacts
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.pin-version.outputs.version }}"
          BASE=~/.m2/repository/io/github/fvarrui/javapackager/${VERSION}
          echo "Checking artifacts in: $BASE"
          ls -la "$BASE"
          test -f "$BASE/javapackager-${VERSION}.jar" || (echo "ERROR: JAR not found" && exit 1)
          test -f "$BASE/javapackager-${VERSION}.pom" || (echo "ERROR: POM not found" && exit 1)
          echo "All required artifacts found."

      - name: Configure Maven for GitHub Packages deploy
        if: steps.check.outputs.exists != 'true'
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Packages
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.pin-version.outputs.version }}"
          BASE=~/.m2/repository/io/github/fvarrui/javapackager/${VERSION}

          DEPLOY_DIR=$(mktemp -d)
          cp "${BASE}/javapackager-${VERSION}.jar" "${DEPLOY_DIR}/"
          cp "${BASE}/javapackager-${VERSION}.pom" "${DEPLOY_DIR}/"

          mvn deploy:deploy-file \
            -DgroupId=io.github.fvarrui \
            -DartifactId=javapackager \
            -Dversion="${VERSION}" \
            -Dpackaging=jar \
            -Dfile="${DEPLOY_DIR}/javapackager-${VERSION}.jar" \
            -DpomFile="${DEPLOY_DIR}/javapackager-${VERSION}.pom" \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/Merkel-Games/AmerecoLauncher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}